name: CNB Release Sync

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing GitHub release tag, blank = latest release"
        required: false
        type: string
      cnb_repo_url:
        description: "CNB repo URL, blank = CNB_REPO_URL variable or default"
        required: false
        type: string

permissions:
  contents: read

env:
  TZ: Asia/Shanghai
  GH_REPO: ${{ github.repository }}
  CNB_REPO_URL: ${{ inputs.cnb_repo_url || vars.CNB_REPO_URL || 'https://cnb.cool/fish2018/webhtv.git' }}

jobs:
  sync:
    name: Sync GitHub release assets to CNB
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve release tag
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG="$RELEASE_TAG"
          if [ -z "$TAG" ]; then
            TAG="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          fi
          gh release view "$TAG" >/dev/null
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Sync tag: $TAG"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist
          mkdir -p dist
          gh release download "${{ steps.meta.outputs.tag }}" \
            --pattern "*.apk" \
            --pattern "*.json" \
            --dir dist
          ls -lh dist
          test "$(find dist -maxdepth 1 -type f \( -name '*.apk' -o -name '*.json' \) | wc -l | tr -d ' ')" -gt 0

      - name: Sync to CNB
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if [ -z "$CNB_TOKEN" ]; then
            echo "::error title=CNB token missing::CNB_TOKEN secret is not configured."
            exit 1
          fi
          AUTH_REPO="$(printf '%s' "$CNB_REPO_URL" | sed "s#^https://#https://cnb:${CNB_TOKEN}@#")"
          clone_cnb() {
            local attempt max_attempts delay
            max_attempts=4
            delay=15
            for attempt in $(seq 1 "$max_attempts"); do
              echo "CNB clone attempt ${attempt}/${max_attempts}"
              rm -rf cnb-mirror
              if timeout 180s git -c http.lowSpeedLimit=1000 -c http.lowSpeedTime=60 clone --depth 1 "$AUTH_REPO" cnb-mirror; then
                return 0
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "::warning title=CNB clone retry::Clone failed, retrying in ${delay}s."
                sleep "$delay"
                delay=$((delay * 2))
              fi
            done
            echo "::error title=CNB clone failed::Cannot connect to CNB from this GitHub runner after ${max_attempts} attempts. If the CNB repository is reachable in a browser, this is likely runner-to-CNB network blocking or timeout."
            return 1
          }
          clone_cnb
          mkdir -p cnb-mirror/apk
          cp dist/*.apk dist/*.json cnb-mirror/apk/
          cd cnb-mirror
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/
          if git diff --cached --quiet; then
            echo "CNB already has the same release assets."
            exit 0
          fi
          git commit -m "${{ steps.meta.outputs.tag }}"
          git push origin HEAD:main
